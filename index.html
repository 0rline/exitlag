<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banner Gamer ExitLag</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Rajdhani', sans-serif; margin: 0; }

    @keyframes pulse-glow {
      from { box-shadow: 0 0 15px #ef4444, 0 0 40px rgba(239,68,68,0.3); }
      to { box-shadow: 0 0 25px #f87171, 0 0 60px rgba(248,113,113,0.4); }
    }
    @keyframes slide-in-out {
      0% { transform: translateX(-120%); opacity: 0; }
      5% { transform: translateX(0); opacity: 1; }
      33.33% { transform: translateX(0); opacity: 1; }
      38.33% { transform: translateX(-120%); opacity: 0; }
      100% { transform: translateX(-120%); opacity: 0; }
    }
    .logo-animate {
      animation: fade-in-out 40s ease-in-out infinite;
    }
    @keyframes fade-in-out {
      0% { opacity: 0; }
      5% { opacity: 1; }
      33.33% { opacity: 1; }
      38.33% { opacity: 0; }
      100% { opacity: 0; }
    }
    .cta-animate {
      animation: fade-in-out 40s ease-in-out infinite;
    }
    .glow-box {
      box-shadow: 0 0 15px #ef4444, 0 0 40px rgba(239,68,68,0.3), inset 0 0 15px rgba(239,68,68,0.1);
      animation: pulse-glow 2s ease-in-out infinite alternate, slide-in-out 40s ease-in-out infinite;
    }
  </style>
</head>
<body class="w-full flex items-start justify-start flex-col gap-4 px-6 py-12" style="min-height: calc(100 * min(var(--vh, 1vh), 1vh)); background: transparent;">
  
  <!-- Logo ExitLag -->
  <img class="h-20 object-contain -mb-6 logo-animate" loading="lazy" 
       src="https://i.imgur.com/ABDxMn7.png" alt="ExitLag logo">
  
  <!-- Caja con código -->
  <div class="glow-box border-2 border-red-500 rounded-lg px-4 py-4 flex items-center gap-0 w-fit" style="background: rgba(30, 5, 5, 0.95);">
    <img class="h-12 w-12 flex-shrink-0" loading="lazy" 
         src="https://i.imgur.com/Dfz3R7j.png" alt="Etiqueta de código">
    <p class="text-2xl md:text-3xl tracking-widest uppercase" style="color: #ffffff; font-weight: 700;">10317633</p>
  </div>
  
  <!-- Texto promocional -->
  <p class="text-lg cta-animate" style="text-shadow: #fca5a5 0px 0px 10px, rgba(252,165,165,0.6) 0px 0px 20px; color: #fca5a5;">
    Usa mi código y obtén 51% de descuento
  </p>

</body>
</html>
